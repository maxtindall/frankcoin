# Publishes site/ to GitHub Pages, which serves frankcoin.website.
# The bundle is committed, so this copies files rather than building —
# but it rebuilds anyway, so a stale frankcoin.js can never ship.
name: site

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build the miner bundle
        working-directory: site
        run: |
          npm install
          npm run build
      - name: Fail if the committed bundle is stale
        working-directory: site
        run: git diff --exit-code -- frankcoin.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
